{% extends "base.html" %}
{% block title %}pyreview - New Review{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Submit Code for Review</h1>

    <form id="review-form" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">
                File Path
            </label>
            <input type="text" id="file-path" value="main.py"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2
                       text-white focus:border-brand-500 focus:outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">
                Python Code
            </label>
            <textarea id="code-input" rows="20"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3
                       font-mono text-sm text-white focus:border-brand-500 focus:outline-none"
                placeholder="Paste your Python code here..."></textarea>
        </div>

        <div class="flex items-center gap-4">
            <button type="submit" id="submit-btn"
                class="bg-brand-600 hover:bg-brand-700 px-6 py-3 rounded-lg
                       font-medium transition disabled:opacity-50">
                Start Review
            </button>
            <div id="status-msg" class="text-sm text-gray-500 hidden"></div>
        </div>
    </form>

    <!-- Progress -->
    <div id="progress-section" class="hidden mt-8">
        <h2 class="text-xl font-bold mb-4">Review Progress</h2>
        <div id="progress-log" class="bg-gray-900 rounded-xl p-4 border border-gray-800
                                       font-mono text-sm space-y-1 max-h-64 overflow-y-auto">
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('review-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submit-btn');
    const statusMsg = document.getElementById('status-msg');
    const progressSection = document.getElementById('progress-section');
    const progressLog = document.getElementById('progress-log');

    btn.disabled = true;
    btn.textContent = 'Submitting...';
    statusMsg.classList.remove('hidden');
    statusMsg.textContent = 'Sending code for review...';

    const filePath = document.getElementById('file-path').value;
    const code = document.getElementById('code-input').value;

    try {
        const resp = await fetch('/api/review', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                files: [{ path: filePath, content: code }]
            })
        });

        const data = await resp.json();
        const reviewId = data.review_id;

        statusMsg.textContent = `Review ${reviewId} started. Waiting for results...`;
        progressSection.classList.remove('hidden');

        // Connect WebSocket for live updates
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${location.host}/ws/review/${reviewId}`);

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const line = document.createElement('div');
            line.textContent = `[${msg.agent}] ${msg.status}`;
            line.className = msg.status === 'completed' ? 'text-green-400' : 'text-gray-400';
            progressLog.appendChild(line);
            progressLog.scrollTop = progressLog.scrollHeight;
        };

        // Poll for completion
        const poll = setInterval(async () => {
            const r = await fetch(`/api/review/${reviewId}`);
            const result = await r.json();
            if (result.status === 'completed' || (result.request && result.status)) {
                clearInterval(poll);
                ws.close();
                window.location.href = `/review/${reviewId}`;
            }
        }, 3000);

    } catch (err) {
        statusMsg.textContent = `Error: ${err.message}`;
        statusMsg.className = 'text-sm text-red-400';
        btn.disabled = false;
        btn.textContent = 'Start Review';
    }
});
</script>
{% endblock %}
