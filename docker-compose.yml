services:
  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
    working_dir: /workspace

  python:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["python"]
    profiles: ["cli"]
