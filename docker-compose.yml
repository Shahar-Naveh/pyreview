services:
  pyreview:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - pyreview-data:/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pyreview-data:
